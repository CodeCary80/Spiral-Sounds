<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/ynr0vvq.css">
  <title>Spiral Sounds</title>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">

    <!-- ROW 1: main navbar -->
    <div class="header-navbar">

      <!-- Logo -->
      <div class="header-logo">
        <span class="header-logo-text">Spiral Sounds</span>
        <div class="header-logo-rule"></div>
      </div>

      <!-- Search -->
      <div class="header-search">
        <form role="search">
          <label for="search-input" class="visually-hidden">Search products</label>
          <input type="text" placeholder="Search records..." id="search-input" autocomplete="off">
        </form>
        <span class="search-arrow">→</span>
      </div>

      <!-- Auth -->
      <div class="header-auth">
        <p id="greeting" class="header-greeting"></p>
        <nav aria-label="Main menu" class="header-menu">
          <a href="/login.html" id="login">Log in</a>
          <a href="/signup.html" id="signup">Sign up</a>
          <button class="header-logout-btn" id="logout-btn">Log out</button>
          <a href="/cart.html" id="cart-banner" class="cart-link"></a>
        </nav>
        <button class="menu-toggle" aria-label="Toggle menu">
          <img src="images/menu.svg" alt="">
        </button>
      </div>

    </div>

    <!-- ROW 2: Today's Pick strip -->
    <div class="header-pick-strip" id="header-pick">
      <!-- rendered by JS -->
    </div>

  </header>

  <!-- ===== CONTROLS BAR ===== -->
  <div class="top-banner" id="top-banner">
    <section class="genre-select-container">
      <label for="genre-select" id="viewbygenre">View by Genre</label>
      <select id="genre-select">
        <option value="">Show All</option>
      </select>
    </section>
  </div>

  <!-- ===== PRODUCT GRID / DETAIL VIEW ===== -->
  <main class="products" id="products-container"></main>

  <footer>
    <p>© Spiral Sounds</p>
  </footer>

  <script src="js/index.js" type="module"></script>
  <script src="js/menu.js" type="module"></script>
</body>

</html>
