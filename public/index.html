<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/ynr0vvq.css">
  <title>Spiral Sounds</title>
</head>

<body>

  <!-- ===== HERO — Full Screen ===== -->
  <section class="hero-section" id="hero-section">

    <!-- Background image (set by JS) -->
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- Sticky nav inside hero -->
    <header class="site-header">
      <div class="header-navbar">

        <!-- Logo -->
        <div class="header-logo">
          <a href="/">
            <span class="header-logo-text">Spiral Sounds</span>
            <div class="header-logo-rule"></div>
          </a>
        </div>

        <!-- Search -->
        <div class="header-search">
          <form role="search">
            <label for="search-input" class="visually-hidden">Search products</label>
            <input type="text" placeholder="Search records..." id="search-input" autocomplete="off">
          </form>
          <span class="search-arrow">→</span>
        </div>

        <!-- Auth -->
        <div class="header-auth">
          <p id="greeting" class="header-greeting"></p>
          <nav aria-label="Main menu" class="header-menu">
            <a href="/login.html" id="login">Log in</a>
            <a href="/signup.html" id="signup">Sign up</a>
            <button class="header-logout-btn" id="logout-btn">Log out</button>
            <a href="/cart.html" id="cart-banner" class="cart-link"></a>
          </nav>
          <button class="menu-toggle" aria-label="Toggle menu">
            <img src="images/menu.svg" alt="">
          </button>
        </div>

      </div>
    </header>

    <!-- Vinyl carousel -->
    <div class="hero-stage">
      <h1>Today's Picks</h1>
      <div class="vinyl-mockup" id="vinyl-mockup">
        <div class="vinyl-disc" id="vinyl-disc">
          <div class="vinyl-label-dot">
            <div class="vinyl-label-inner"></div>
          </div>
        </div>
        <img class="vinyl-cover" id="vinyl-cover" src="" alt="">
      </div>

      <div class="vinyl-info" id="vinyl-info">
        <div class="vinyl-genre" id="vinyl-genre"></div>
        <div class="vinyl-title" id="vinyl-title"></div>
        <div class="vinyl-artist" id="vinyl-artist"></div>
      </div>
    </div>



  </section>

  <!-- ===== EDITORIAL SECTION ===== -->
  <section class="editorial-section" id="editorial-section">

    <div class="editorial-eyebrow">
      <span class="editorial-diamond">♦</span>
      About Spiral Sounds
      <span class="editorial-diamond">♦</span>
    </div>

    <h2 class="editorial-headline">
      <span class="ed-line">Music you can</span>
      <span class="ed-line">hold in your hands.</span>
      <em class="ed-line">Records worth owning.</em>
    </h2>

    <div class="editorial-cta-wrap">
      <button class="editorial-cta" id="browse-btn">↳ &nbsp;Browse the collection</button>
    </div>

    <div class="editorial-bottom-bar">
      <div class="editorial-tip">
        <span class="editorial-diamond">♦</span>
        Browse by genre
      </div>
      <div class="editorial-scroll-hint">↓ Scroll</div>
    </div>

  </section>

  <!-- ===== PRODUCTS SECTION ===== -->
  <main class="products-section" id="products-section">

    <!-- Genre scatter view (default) -->
    <div id="genre-view">
      <div class="genre-scatter-wrap" id="genre-scatter"></div>
    </div>

    <!-- Product list view (shown after clicking a genre) -->
    <div id="product-list-view" style="display:none;">
      <div class="genre-back-bar" id="genre-back-bar">
        <span class="genre-back-arrow">←</span>
        <span class="genre-back-label">All Genres</span>
        <span style="color:rgba(255,255,255,0.3); margin:0 0.3rem;">·</span>
        <span class="genre-back-name" id="genre-back-name"></span>
      </div>
      <div id="products-container" style="width:100%;display:block;"></div>
    </div>

  </main>

  <footer>
    <p>© Spiral Sounds</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/index.js" type="module"></script>
  <script src="js/menu.js" type="module"></script>

</body>
</html>
