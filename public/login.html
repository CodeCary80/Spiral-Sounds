<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://use.typekit.net/ynr0vvq.css">
  <title>Log In — Spiral Sounds</title>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-navbar">

      <a href="/" class="header-logo">
        <span class="header-logo-text">← Spiral Sounds</span>
        <div class="header-logo-rule"></div>
      </a>

      <div class="header-auth" style="margin-left:auto;">
        <nav aria-label="Main menu" class="header-menu">
          <a href="/signup.html">Sign up</a>
        </nav>
      </div>

    </div>
  </header>

  <!-- ===== LOGIN FORM ===== -->
  <main class="auth-page">
    <div class="auth-box">

      <div class="auth-title">Welcome Back</div>
      <div class="auth-subtitle">Log in to your account</div>

      <form id="signin-form" autocomplete="off">
        <div class="auth-field">
          <label class="auth-label" for="signin-username">Username</label>
          <input
            class="auth-input"
            type="text"
            id="signin-username"
            name="username"
            required
            pattern="^[a-zA-Z0-9_\-]{1,20}$"
            title="1–20 characters: letters, numbers, underscores or hyphens."
          >
        </div>

        <div class="auth-field">
          <label class="auth-label" for="signin-password">Password</label>
          <input
            class="auth-input"
            type="password"
            id="signin-password"
            name="password"
            required
          >
        </div>

        <p id="error-message" class="auth-error"></p>

        <button type="submit" class="auth-btn">Log In</button>
      </form>

      <div class="auth-divider"></div>

      <div class="auth-link-row">
        No account? <a class="auth-link" href="/signup.html">Sign up here</a>
      </div>

    </div>
  </main>

  <footer>
    <p>© Spiral Sounds</p>
  </footer>

  <script src="js/login.js" type="module"></script>

</body>
</html>
